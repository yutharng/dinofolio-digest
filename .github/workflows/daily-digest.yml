name: Dino Digest Daily

on:
  schedule:
    # GitHub มัก drop cron ที่นาทีกลม (:00/:30) ช่วง load สูง → ใช้นาทีเลขคี่
    # และตั้งหลายรอบกันพลาด (รอบที่ไม่มีไฟล์ใหม่จะไม่ commit อะไร = ไม่มีผลข้างเคียง)
    - cron: "17 23 * * *"   # 06:17 น. ไทย
    - cron: "52 23 * * *"   # 06:52 น. ไทย (เก็บตกถ้า dinofolio ลงข้อมูลช้า)
    - cron: "37 0 * * *"    # 07:37 น. ไทย (เก็บตกรอบสอง)
    - cron: "7 5 * * *"     # 12:07 น. ไทย (กันเหนียวรอบเที่ยง)
  workflow_dispatch: {}     # ปุ่มกดรันเองสำหรับทดสอบ

permissions:
  contents: write           # ให้ workflow commit ไฟล์กลับเข้า repo ได้

concurrency:
  group: dino-digest        # กันหลายรอบรันชนกันเอง
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install beautifulsoup4

      - name: Fetch digest
        run: python scripts/fetch_digest.py

      - name: Commit & push
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add daily/
          git diff --cached --quiet || git commit -m "digest: $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
